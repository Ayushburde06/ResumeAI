name: Deploy to AWS EC2

on:
  push:
    branches:
      - main   # auto-deploy every time you push to main

jobs:
  deploy:
    name: SSH → Pull → Rebuild → Restart
    runs-on: ubuntu-latest

    steps:
      # ── 1. SSH into EC2 and deploy ───────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}        # EC2 public IP or domain
          username: ${{ secrets.EC2_USER }}        # e.g. ubuntu, ec2-user, admin
          key:      ${{ secrets.EC2_SSH_KEY }}     # contents of your .pem private key
          port:     22
          script: |
            set -e

            # ── Go to project directory ────────────────────────────────────────
            if [ -d "$HOME/ResumeAI" ]; then
              cd "$HOME/ResumeAI"
            elif [ -d "$HOME/resume-saas-main" ]; then
              cd "$HOME/resume-saas-main"
            else
              echo "Error: Project directory not found on server!"
              exit 1
            fi

            echo "=== Pulling latest code ==="
            git fetch origin main
            git reset --hard origin/main

            # ── Detect docker-compose command ──────────────────────────────────
            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              echo "Error: Neither 'docker compose' nor 'docker-compose' found!"
              exit 1
            fi
            echo "Using compose command: $COMPOSE_CMD"

            echo "=== Rebuilding and restarting containers ==="
            $COMPOSE_CMD down --remove-orphans
            $COMPOSE_CMD up --build -d

            echo "=== Waiting for containers to be healthy ==="
            sleep 5
            $COMPOSE_CMD ps

            echo "=== Recent backend logs ==="
            $COMPOSE_CMD logs backend --tail=30

            echo "=== Deploy complete ==="
